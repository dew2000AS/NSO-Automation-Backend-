# informix debugging
# Enhanced debugging for Informix connection issues
# Enhanced SQL and Parameter Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.type.descriptor.sql.BasicExtractor=TRACE
logging.level.org.hibernate.engine.jdbc.spi.SqlStatementLogger=DEBUG
logging.level.org.hibernate.resource.transaction=DEBUG

# Informix-specific debugging
logging.level.com.informix=DEBUG
logging.level.com.informix.jdbc=DEBUG
logging.level.com.informix.jdbc.IfxPreparedStatement=TRACE

# Spring JPA debugging
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.org.springframework.transaction=DEBUG
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG

### Redis Configuration for User Session Management
# Spring Data Redis (minimal config since you have embedded Redis)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Session Configuration with Redis
spring.session.store-type=redis
spring.session.redis.namespace=spring:session:secinfo

# Session timeout (already exists in your config, but make sure it's set)
server.servlet.session.timeout=1d