# JPA / Hibernate Configuration
# spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.default_schema=PRODMISS
spring.jpa.properties.hibernate.default_schema=testdbnew

#spring.jpa.properties.hibernate.default_schema=DACONS12
#spring.jpa.properties.hibernate.default_schema=SPSNEW

spring.jpa.open-in-view=false
# spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
